name: Deploy FSL Website


on:
  repository_dispatch:
    types: [site-bundle-ready]


permissions:
  contents: read
  pages: write
  id-token: write


concurrency:
  group: "pages"
  cancel-in-progress: false


jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Pull the built site bundle
        uses: actions/download-artifact@v7
        with:
          name: site-bundle
          path: ./site
          repository: ${{ secrets.BUILDER_REPO }}
          run-id: ${{ github.event.client_payload.run_id }}
          github-token: ${{ secrets.BUILDER_ARTIFACT_TOKEN }}

      - name: 🏗 Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
